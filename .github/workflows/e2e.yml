name: E2E Tests (post-deploy)

# Triggered automatically by Vercel's GitHub integration when a preview
# deployment succeeds. Runs the full Playwright suite against the live URL.
# Production deployments are excluded — E2E only targets preview.
on:
  deployment_status:

jobs:
  playwright:
    name: Playwright E2E
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'Production'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Link e2e_tests to frontend node_modules
        run: ln -sf ../frontend/node_modules e2e_tests/node_modules

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Determine test URL
        id: test_url
        run: |
          ENVIRONMENT="${{ github.event.deployment.environment }}"
          DEMO_URL="https://vms-demo.ocss.tech"
          # For demo branch deployments, Vercel sets the environment to a name
          # containing "demo". Use the canonical alias URL instead of the raw
          # deployment URL (which goes cold between branch E2E and post-merge E2E).
          if echo "$ENVIRONMENT" | grep -qi "demo"; then
            echo "url=${DEMO_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ github.event.deployment_status.environment_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.test_url.outputs.url }}
          CI: 'true'
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          # Branch name for test data namespacing (used by global-setup.ts)
          GITHUB_HEAD_REF: ${{ github.event.deployment.ref }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7
